[package]
name        = "kijiji-engine"
version     = "0.1.0"
edition     = "2021"
description = "Project Kijiji — Rust data plane for BGP trombone detection"

[[bin]]
name = "kijiji-engine"
path = "src/main.rs"

[dependencies]
petgraph   = "=0.6.4"
serde      = { version = "1.0.193", features = ["derive"] }
serde_json = "1.0.108"

[patch.crates-io]
indexmap= { git = "https://github.com/bluss/indexmap", rev = "2.2.6"}