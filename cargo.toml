[package]
name        = "kijiji-engine"
version     = "0.1.0"
edition     = "2021"
description = "Project Kijiji — Rust data plane for BGP trombone detection"

[[bin]]
name = "kijiji-engine"
path = "src/main.rs"

[dependencies]
petgraph   = "=0.6.4"
serde      = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[patch.crates-io]
indexmap= { version = "2.2.6"}